basePath: /api/v1
definitions:
  event.CreateEventCommand:
    properties:
      description:
        type: string
      end_date_time:
        description: RFC3339形式（オプション）
        type: string
      event_type:
        type: string
      official_url:
        type: string
      performer_ids:
        items:
          type: string
        type: array
      start_date_time:
        description: RFC3339形式
        type: string
      tags:
        items:
          type: string
        type: array
      ticket_url:
        type: string
      title:
        type: string
      venue_id:
        type: string
    required:
    - event_type
    - start_date_time
    - title
    type: object
  event.EventDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      end_date_time:
        type: string
      event_type:
        type: string
      id:
        type: string
      official_url:
        type: string
      performer_ids:
        items:
          type: string
        type: array
      start_date_time:
        type: string
      tags:
        items:
          type: string
        type: array
      ticket_url:
        type: string
      title:
        type: string
      updated_at:
        type: string
      venue_id:
        type: string
    type: object
  event.PaginationLinks:
    properties:
      first:
        type: string
      last:
        type: string
      next:
        type: string
      prev:
        type: string
    type: object
  event.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  event.SearchResult:
    properties:
      data:
        items:
          $ref: '#/definitions/event.EventDTO'
        type: array
      links:
        $ref: '#/definitions/event.PaginationLinks'
      meta:
        $ref: '#/definitions/event.PaginationMeta'
    type: object
  handlers.BulkCreateIdolsRequest:
    properties:
      idols:
        items:
          properties:
            agency_id:
              type: string
            birthdate:
              type: string
            name:
              maxLength: 100
              minLength: 1
              type: string
          required:
          - name
          type: object
        maxItems: 100
        minItems: 1
        type: array
    required:
    - idols
    type: object
  handlers.BulkImportItem:
    properties:
      agency_id:
        type: string
      aliases:
        items:
          type: string
        type: array
      birthdate:
        description: YYYY-MM-DD
        type: string
      name:
        type: string
      tag_ids:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  handlers.BulkImportRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/handlers.BulkImportItem'
        maxItems: 1000
        minItems: 1
        type: array
    required:
    - items
    type: object
  handlers.CreateIdolRequest:
    properties:
      agency_id:
        type: string
      aliases:
        items:
          type: string
        type: array
      birthdate:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  handlers.CreateSubscriptionRequest:
    properties:
      events:
        items:
          type: string
        minItems: 1
        type: array
      url:
        type: string
    required:
    - events
    - url
    type: object
  handlers.JobStatusDTO:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      error_msg:
        type: string
      id:
        type: string
      job_type:
        type: string
      result:
        type: string
      started_at:
        type: string
      status:
        type: string
    type: object
  handlers.SubscriptionResponse:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      created_by:
        type: string
      events:
        items:
          type: string
        type: array
      id:
        type: string
      secret:
        description: 作成時のみ返す
        type: string
      url:
        type: string
    type: object
  handlers.UpdateExternalIDsRequest:
    properties:
      external_ids:
        additionalProperties:
          type: string
        type: object
    required:
    - external_ids
    type: object
  handlers.UpdateIdolRequest:
    properties:
      agency_id:
        type: string
      aliases:
        items:
          type: string
        type: array
      birthdate:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  idol.BulkError:
    properties:
      index:
        type: integer
      message:
        type: string
      name:
        type: string
    type: object
  idol.BulkResult:
    properties:
      created:
        items:
          $ref: '#/definitions/idol.IdolDTO'
        type: array
      error_count:
        type: integer
      errors:
        items:
          $ref: '#/definitions/idol.BulkError'
        type: array
      success_count:
        type: integer
    type: object
  idol.DuplicateCandidateDTO:
    properties:
      idol:
        $ref: '#/definitions/idol.IdolDTO'
      reason:
        type: string
      score:
        type: integer
    type: object
  idol.IdolDTO:
    properties:
      age:
        type: integer
      agency:
        description: include=agency時に展開
      agency_id:
        type: string
      aliases:
        description: 別名一覧（多言語・旧名）
        items:
          type: string
        type: array
      birthdate:
        type: string
      created_at:
        type: string
      external_ids:
        additionalProperties:
          type: string
        description: 外部サービスIDマッピング
        type: object
      id:
        type: string
      name:
        type: string
      social_links:
        description: SNS/外部リンク
      updated_at:
        type: string
    type: object
  idol.PaginationLinks:
    properties:
      first:
        type: string
      last:
        type: string
      next:
        type: string
      prev:
        type: string
    type: object
  idol.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  idol.SearchResult:
    properties:
      data:
        items:
          $ref: '#/definitions/idol.IdolDTO'
        type: array
      links:
        $ref: '#/definitions/idol.PaginationLinks'
      meta:
        $ref: '#/definitions/idol.PaginationMeta'
    type: object
  idol.UpdateSocialLinksCommand:
    properties:
      facebook:
        type: string
      fan_club:
        type: string
      id:
        type: string
      instagram:
        type: string
      official_website:
        type: string
      tiktok:
        type: string
      twitter:
        type: string
      youtube:
        type: string
    type: object
  middleware.ErrorResponse:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  tag.CreateTagCommand:
    properties:
      category:
        enum:
        - genre
        - region
        - style
        - other
        type: string
      description:
        maxLength: 200
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - category
    - name
    type: object
  tag.PaginationLinks:
    properties:
      first:
        type: string
      last:
        type: string
      next:
        type: string
      prev:
        type: string
    type: object
  tag.PaginationMeta:
    properties:
      has_next:
        type: boolean
      has_prev:
        type: boolean
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  tag.SearchResult:
    properties:
      data:
        items:
          $ref: '#/definitions/tag.TagDTO'
        type: array
      links:
        $ref: '#/definitions/tag.PaginationLinks'
      meta:
        $ref: '#/definitions/tag.PaginationMeta'
    type: object
  tag.TagDTO:
    properties:
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  tag.UpdateTagCommand:
    properties:
      category:
        enum:
        - genre
        - region
        - style
        - other
        type: string
      description:
        maxLength: 200
        type: string
      id:
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - category
    - name
    type: object
host: localhost:8081
info:
  contact:
    email: support@idol-api.com
    name: API Support
  description: 包括的アイドル情報API - アイドル、グループ、事務所、イベント情報を提供
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Idol API
  version: "1.0"
paths:
  /admin/analytics/usage:
    get:
      description: APIキー単位のAPI利用統計を返す（管理者専用）
      parameters:
      - default: 7
        description: 集計期間（日数、デフォルト7、最大90）
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: API利用サマリー取得
      tags:
      - admin
  /admin/export/idols:
    get:
      description: 全アイドルデータをJSON/JSONL形式でエクスポートする（管理者専用、レート制限あり）
      parameters:
      - default: json
        description: 出力形式 (json|jsonl)
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドルエクスポート
      tags:
      - export
  /admin/export/logs:
    get:
      description: エクスポートの実行履歴を返す（管理者専用）
      parameters:
      - description: 件数上限（最大100、デフォルト50）
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: エクスポート実行履歴
      tags:
      - export
  /admin/jobs/{id}:
    get:
      description: 指定したジョブのステータスと結果を返す（管理者専用）
      parameters:
      - description: ジョブID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.JobStatusDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: ジョブステータス取得
      tags:
      - admin
  /admin/jobs/{id}/retry:
    post:
      description: 失敗したジョブを再実行する（管理者専用）
      parameters:
      - description: ジョブID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: ジョブリトライ
      tags:
      - admin
  /admin/jobs/bulk-import:
    post:
      consumes:
      - application/json
      description: バルクインポートを非同期で実行するジョブをキューに追加する（管理者専用）
      parameters:
      - description: インポートデータ
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BulkImportRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: バルクインポートジョブ作成
      tags:
      - admin
  /admin/webhooks:
    get:
      description: Webhook購読一覧を返す（管理者専用）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.SubscriptionResponse'
            type: array
      summary: Webhook購読一覧
      tags:
      - webhooks
    post:
      consumes:
      - application/json
      description: 新しいWebhook購読を作成する（管理者専用）
      parameters:
      - description: 購読設定
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.SubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: Webhook購読作成
      tags:
      - webhooks
  /admin/webhooks/{id}:
    delete:
      description: Webhook購読を削除する（管理者専用）
      parameters:
      - description: 購読ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: Webhook購読削除
      tags:
      - webhooks
  /events:
    get:
      consumes:
      - application/json
      description: 条件を指定してイベント一覧を取得（検索・フィルタリング・ページネーション対応）
      parameters:
      - description: イベントタイプ
        enum:
        - live
        - handshake
        - release
        - fan_meeting
        - online
        in: query
        name: event_type
        type: string
      - description: 開始日FROM (YYYY-MM-DD)
        in: query
        name: start_date_from
        type: string
      - description: 開始日TO (YYYY-MM-DD)
        in: query
        name: start_date_to
        type: string
      - description: 会場ID
        in: query
        name: venue_id
        type: string
      - description: パフォーマーID
        in: query
        name: performer_id
        type: string
      - collectionFormat: csv
        description: タグ（複数可）
        in: query
        items:
          type: string
        name: tags
        type: array
      - default: start_date_time
        description: ソート項目
        enum:
        - start_date_time
        - created_at
        in: query
        name: sort
        type: string
      - default: asc
        description: ソート順
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - default: 1
        description: ページ番号
        in: query
        name: page
        type: integer
      - default: 20
        description: 1ページあたりの件数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/event.SearchResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: イベント一覧取得
      tags:
      - events
    post:
      consumes:
      - application/json
      description: 新しいイベント/ライブを作成する
      parameters:
      - description: イベント作成リクエスト
        in: body
        name: event
        required: true
        schema:
          $ref: '#/definitions/event.CreateEventCommand'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/event.EventDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: イベント作成
      tags:
      - events
  /events/{id}:
    get:
      consumes:
      - application/json
      description: IDを指定してイベント情報を取得する
      parameters:
      - description: イベントID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/event.EventDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: イベント詳細取得
      tags:
      - events
  /idols:
    get:
      consumes:
      - application/json
      description: 条件を指定してアイドル一覧を取得（検索・フィルタリング・ページネーション対応）
      parameters:
      - description: 名前（部分一致）
        in: query
        name: name
        type: string
      - description: 事務所ID
        in: query
        name: agency_id
        type: string
      - description: 最小年齢
        in: query
        name: age_min
        type: integer
      - description: 最大年齢
        in: query
        name: age_max
        type: integer
      - description: 生年月日FROM (YYYY-MM-DD)
        in: query
        name: birthdate_from
        type: string
      - description: 生年月日TO (YYYY-MM-DD)
        in: query
        name: birthdate_to
        type: string
      - description: '関連データ読み込み (カンマ区切り: agency,groups)'
        in: query
        name: include
        type: string
      - default: created_at
        description: ソート項目
        enum:
        - name
        - birthdate
        - created_at
        in: query
        name: sort
        type: string
      - default: desc
        description: ソート順
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - default: 1
        description: ページ番号
        in: query
        name: page
        type: integer
      - default: 20
        description: 1ページあたりの件数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/idol.SearchResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドル一覧取得
      tags:
      - idols
    post:
      consumes:
      - application/json
      description: 新しいアイドルを作成する
      parameters:
      - description: アイドル作成リクエスト
        in: body
        name: idol
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateIdolRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/idol.IdolDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドル作成
      tags:
      - idols
  /idols/{id}:
    delete:
      consumes:
      - application/json
      description: IDを指定してアイドルを削除する
      parameters:
      - description: アイドルID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドル削除
      tags:
      - idols
    get:
      consumes:
      - application/json
      description: IDを指定してアイドル情報を取得する
      parameters:
      - description: アイドルID
        in: path
        name: id
        required: true
        type: string
      - description: '関連データ読み込み (カンマ区切り: agency,groups)'
        in: query
        name: include
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/idol.IdolDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドル詳細取得
      tags:
      - idols
    put:
      consumes:
      - application/json
      description: IDを指定してアイドル情報を更新する
      parameters:
      - description: アイドルID
        in: path
        name: id
        required: true
        type: string
      - description: アイドル更新リクエスト
        in: body
        name: idol
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateIdolRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドル更新
      tags:
      - idols
  /idols/{id}/duplicate-candidates:
    get:
