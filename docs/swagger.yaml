  /tags:
    get:
      consumes:
      - application/json
      description: 条件を指定してタグ一覧を取得（検索・フィルタリング・ページネーション対応）
      parameters:
      - description: タグ名（部分一致）
        in: query
        name: name
        type: string
      - description: カテゴリ
        enum:
        - genre
        - region
        - style
        - other
        in: query
        name: category
        type: string
      - default: 1
        description: ページ番号
        in: query
        name: page
        type: integer
      - default: 20
        description: 1ページあたりの件数
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
