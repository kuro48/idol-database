host: localhost:8081
info:
  contact:
    email: support@idol-api.com
    name: API Support
  description: 包括的アイドル情報API - アイドル、グループ、事務所、イベント情報を提供
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Idol API
  version: "1.0"
paths:
  /admin/analytics/usage:
    get:
      description: APIキー単位のAPI利用統計を返す（管理者専用）
      parameters:
      - default: 7
        description: 集計期間（日数、デフォルト7、最大90）
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: API利用サマリー取得
      tags:
      - admin
  /admin/apikeys:
    get:
      parameters:
      - description: メールアドレス
        in: query
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.apiKeyResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: APIキー一覧取得
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: APIキー作成リクエスト
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.createAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.createAPIKeyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: APIキーの作成
      tags:
      - admin
  /admin/apikeys/{id}:
    delete:
      parameters:
      - description: APIキーID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: APIキーの無効化
      tags:
      - admin
  /admin/export/idols:
    get:
      description: 全アイドルデータをJSON/JSONL形式でエクスポートする（管理者専用、レート制限あり）
      parameters:
      - default: json
        description: 出力形式 (json|jsonl)
        in: query
        name: format
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: アイドルエクスポート
      tags:
      - export
  /admin/export/logs:
    get:
      description: エクスポートの実行履歴を返す（管理者専用）
      parameters:
      - description: 件数上限（最大100、デフォルト50）
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: エクスポート実行履歴
      tags:
      - export
  /admin/jobs/{id}:
    get:
      description: 指定したジョブのステータスと結果を返す（管理者専用）
      parameters:
      - description: ジョブID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.JobStatusDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/middleware.ErrorResponse'
      summary: ジョブステータス取得
      tags:
      - admin
