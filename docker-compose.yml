services:
  mongodb:
    image: mongo:6
    container_name: idol-api-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - app_network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: idol-api
    restart: always
    ports:
      - '${SERVER_PORT:-8081}:${SERVER_PORT:-8081}'
    networks:
      - app_network
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      GIN_MODE: ${GIN_MODE:-release}
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local

networks:
  app_network:
    driver: bridge
